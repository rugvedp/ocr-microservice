apiVersion: apps/v1
kind: Deployment
metadata:
  name: tesseract
  labels:
    app: tesseract
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tesseract
  template:
    metadata:
      labels:
        app: tesseract
    spec:
      containers:
        - name: tesseract
          image: tesseract-ocr:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /status
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 3
