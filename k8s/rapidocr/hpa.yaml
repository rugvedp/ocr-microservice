# HorizontalPodAutoscaler: watches CPU usage and adds/removes pods automatically.
# When avg CPU across all rapidocr pods > 70%, it creates a new pod (up to 5).
# When CPU drops, it removes pods (down to 1). Has a 5-minute scale-down cooldown.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: rapidocr-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: rapidocr          # Watch this Deployment
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70   # Scale up when avg CPU > 70%
